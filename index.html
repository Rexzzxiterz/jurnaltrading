<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKY JOURNAL TRADE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
</head>
<body class="bg-black text-white min-h-screen overflow-x-hidden">

<!-- PARTICLE BACKGROUND -->
<div id="tsparticles" class="fixed top-0 left-0 w-full h-full -z-10"></div>

<div class="max-w-6xl mx-auto p-4 md:p-6">
  <div class="text-center mb-6">
    <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent animate-pulse">
      ☁️ SKY JOURNAL TRADE
    </h1>
    <p class="text-gray-400 text-sm">Track. Improve. Dominate.</p>
  </div>

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

  <div class="bg-white/5 backdrop-blur-lg p-4 rounded-xl mb-6">
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
      <input id="pair" placeholder="Pair" class="p-2 bg-black/50 rounded">
      <input id="entry" type="text" placeholder="Entry" class="p-2 bg-black/50 rounded">
      <input id="exit" type="text" placeholder="Exit" class="p-2 bg-black/50 rounded">
      <input id="lot" type="text" placeholder="Lot" class="p-2 bg-black/50 rounded">
      <select id="type" class="p-2 bg-black/50 rounded">
        <option>Buy</option>
        <option>Sell</option>
      </select>
      <input id="date" type="date" class="p-2 bg-black/50 rounded">
    </div>
    <button onclick="addTrade()" class="mt-4 w-full bg-blue-600 py-2 rounded active:scale-95">Tambah</button>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 text-center">
    <div class="bg-green-600 p-3 rounded">Profit<br><b id="profit">0</b></div>
    <div class="bg-red-600 p-3 rounded">Loss<br><b id="loss">0</b></div>
    <div class="bg-blue-600 p-3 rounded">Trade<br><b id="count">0</b></div>
    <div class="bg-purple-600 p-3 rounded">Win<br><b id="win">0%</b></div>
  </div>

  <div class="bg-white/5 p-4 rounded-xl mb-6">
    <canvas id="chart"></canvas>
  </div>

  <div class="bg-white/5 p-4 rounded-xl overflow-x-auto">
    <table class="w-full text-sm">
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
let trades = JSON.parse(localStorage.getItem('trades'))||[];
let chart;

function sound(){document.getElementById('clickSound').play();}

function profitCalc(t){
  let e=parseFloat(t.entry),x=parseFloat(t.exit),l=parseFloat(t.lot);
  return t.type==='Buy'?(x-e)*l:(e-x)*l;
}

function addTrade(){
  sound();
  let t={pair:pair.value,entry:entry.value,exit:exit.value,lot:lot.value,type:type.value,date:date.value};
  trades.push(t);
  localStorage.setItem('trades',JSON.stringify(trades));
  render();
}

function del(i){sound();trades.splice(i,1);localStorage.setItem('trades',JSON.stringify(trades));render();}

function render(){
  let p=0,l=0,w=0,data=[];
  table.innerHTML='';

  trades.forEach((t,i)=>{
    let pr=profitCalc(t);
    if(pr>=0){p+=pr;w++;}else l+=Math.abs(pr);
    data.push(p-l);

    table.innerHTML+=`<tr class="border-b border-gray-700">
      <td>${t.pair}</td>
      <td class="${pr>=0?'text-green-400':'text-red-400'}">${pr.toFixed(2)}</td>
      <td><button onclick="del(${i})">❌</button></td>
    </tr>`;
  });

  profit.innerText=p.toFixed(2);
  loss.innerText=l.toFixed(2);
  count.innerText=trades.length;
  win.innerText=trades.length?((w/trades.length)*100).toFixed(1)+'%':'0%';

  if(chart) chart.destroy();
  chart=new Chart(chartCanvas(),{
    type:'line',
    data:{labels:data.map((_,i)=>i+1),datasets:[{data:data}]},
    options:{responsive:true}
  });
}

function chartCanvas(){return document.getElementById('chart');}

render();

tsParticles.load("tsparticles",{
  particles:{number:{value:60},color:{value:"#00ffff"},links:{enable:true,color:"#00ffff"},move:{enable:true,speed:1}},
  background:{color:"#000"}
});
</script>

</body>
</html>
